<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Earth Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden; height: 100vh; display: flex; flex-direction: row;
}
/* Main area: globe + map stacked */
#main-area { flex: 1; position: relative; display: flex; flex-direction: column; }
#globe-container { flex: 1; width: 100%; position: relative; }
canvas#globe { width: 100%; height: 100%; display: block; }
#map-container {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #1a1a2e; z-index: 5;
}
#map-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
#map-canvas:active { cursor: grabbing; }
/* Right-side panel — 30% of viewport */
#side-panel {
  width: 34vw; min-width: 380px; max-width: 600px; padding: 30px 24px; display: flex;
  flex-direction: column; gap: 20px; background: rgba(10,10,20,0.95);
  border-left: 1px solid #222; overflow-y: auto; z-index: 10;
}
#side-panel h2 { font-size: 28px; font-weight: 600; color: #e5e7eb; margin: 0; }
.panel-section { display: flex; flex-direction: column; gap: 16px; }
.panel-divider { border: none; border-top: 1px solid #222; margin: 8px 0; }
#controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
input#location-input {
  padding: 18px 20px; border-radius: 10px; border: 1px solid #333;
  background: #111827; color: #fff; font-size: 24px; width: 100%; outline: none;
}
input#location-input:focus { border-color: #2563eb; }
input#location-input::placeholder { color: #555; }
#go-row { display: flex; gap: 10px; }
button {
  padding: 18px 28px; border-radius: 10px; border: none;
  background: #2563eb; color: #fff; font-size: 22px; font-weight: 600;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
button:hover { background: #1d4ed8; }
button:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
#map-btn { display: none; background: #059669; }
#map-btn:hover { background: #047857; }
#back-btn { display: none; background: #6366f1; }
#back-btn:hover { background: #4f46e5; }
#status { font-size: 20px; color: #6b7280; min-height: 24px; margin-top: auto; }
#map-controls {
  position: absolute; top: 20px; right: 20px; display: flex;
  flex-direction: column; gap: 10px; z-index: 20;
}
#map-controls button {
  width: 64px; height: 64px; font-size: 34px; padding: 0;
  border-radius: 12px; background: rgba(30,30,50,0.9); backdrop-filter: blur(8px);
}
#map-controls button:hover { background: rgba(50,50,80,0.95); }
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 15; display: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,100,100,0.6);
}
#crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
#crosshair::after { width: 2px; height: 20px; top: -10px; left: -1px; }

/* Drop zone */
#drop-zone {
  border: 3px dashed #444; border-radius: 12px; padding: 28px 24px;
  text-align: center; color: #6b7280; font-size: 22px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
}
#drop-zone.drag-over { border-color: #2563eb; background: rgba(37,99,235,0.1); color: #93c5fd; }
#drop-zone.loaded { border-color: #059669; color: #6ee7b7; }

/* YouTube drop zone */
#yt-drop-zone {
  border: 3px dashed #444; border-radius: 12px; padding: 28px 24px;
  text-align: center; color: #6b7280; font-size: 22px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
}
#yt-drop-zone.drag-over { border-color: #dc2626; background: rgba(220,38,38,0.1); color: #fca5a5; }
#yt-drop-zone.loaded { border-color: #059669; color: #6ee7b7; }
#yt-drop-zone.processing { border-color: #f59e0b; color: #fcd34d; animation: ytPulse 1.5s ease-in-out infinite; }
@keyframes ytPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Paste transcript area */
#paste-transcript {
  width: 100%; min-height: 120px; max-height: 300px; padding: 14px 16px;
  border-radius: 10px; border: 1px solid #333; background: #111827; color: #d1d5db;
  font-size: 18px; font-family: inherit; resize: vertical; outline: none;
  scrollbar-width: thin; scrollbar-color: #444 #111827;
}
#paste-transcript:focus { border-color: #2563eb; }
#paste-transcript::placeholder { color: #555; }
#paste-transcript::-webkit-scrollbar { width: 8px; }
#paste-transcript::-webkit-scrollbar-track { background: #111827; }
#paste-transcript::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
#process-text-btn { background: #7c3aed; }
#process-text-btn:hover { background: #6d28d9; }

/* AI prompt section */
#ai-prompt-input {
  width: 100%; min-height: 80px; max-height: 200px; padding: 14px 16px;
  border-radius: 10px; border: 1px solid #333; background: #111827; color: #d1d5db;
  font-size: 18px; font-family: inherit; resize: vertical; outline: none;
  scrollbar-width: thin; scrollbar-color: #444 #111827;
}
#ai-prompt-input:focus { border-color: #2563eb; }
#ai-prompt-input::placeholder { color: #555; }
#ai-prompt-input::-webkit-scrollbar { width: 8px; }
#ai-prompt-input::-webkit-scrollbar-track { background: #111827; }
#ai-prompt-input::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
#create-list-btn { background: #d97706; }
#create-list-btn:hover { background: #b45309; }
#create-list-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

/* Hamburger settings menu */
#settings-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 1000;
  width: 44px; height: 44px; border-radius: 8px; border: none;
  background: rgba(30,30,50,0.85); backdrop-filter: blur(8px);
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  padding: 0; transition: background 0.2s;
}
#settings-toggle:hover { background: rgba(50,50,80,0.95); }
#settings-toggle .bar {
  width: 22px; height: 2px; background: #d1d5db; border-radius: 1px;
  transition: transform 0.25s, opacity 0.25s;
}
#settings-toggle.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
#settings-toggle.open .bar:nth-child(2) { opacity: 0; }
#settings-toggle.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

#settings-panel {
  display: none; position: fixed; top: 68px; right: 16px; z-index: 999;
  width: 360px; padding: 20px; border-radius: 12px;
  background: rgba(15,15,30,0.95); backdrop-filter: blur(12px);
  border: 1px solid #333; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#settings-panel.open { display: block; }
#settings-panel h3 { font-size: 18px; color: #e5e7eb; margin: 0 0 14px; }
#settings-panel .doc-btn {
  display: block; width: 100%; margin-top: 10px; padding: 12px 16px;
  font-size: 15px; border-radius: 8px; border: none;
  background: #374151; color: #e5e7eb; cursor: pointer; font-weight: 600;
  text-align: left; transition: background 0.2s;
}
#settings-panel .doc-btn:hover { background: #4b5563; }

/* Doc modal */
#doc-modal {
  display: none; position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
  padding: 40px;
}
#doc-modal.open { display: flex; }
#doc-modal-content {
  background: #0f0f1e; border: 1px solid #333; border-radius: 12px;
  max-width: 900px; width: 100%; max-height: 90vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
#doc-modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; border-bottom: 1px solid #222;
}
#doc-modal-header h3 { font-size: 20px; color: #e5e7eb; margin: 0; }
#doc-modal-close {
  background: transparent; color: #9ca3af; font-size: 28px; padding: 0 10px;
  line-height: 1; border-radius: 6px;
}
#doc-modal-close:hover { background: #1f2937; color: #fff; }
#doc-modal-body {
  padding: 24px 28px; overflow-y: auto; color: #d1d5db; font-size: 16px;
  line-height: 1.6;
}
#doc-modal-body.raw {
  white-space: pre-wrap;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 14px;
}
#doc-modal-body.rendered h1 { font-size: 28px; color: #f3f4f6; margin: 18px 0 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
#doc-modal-body.rendered h2 { font-size: 22px; color: #f3f4f6; margin: 18px 0 10px; border-bottom: 1px solid #222; padding-bottom: 6px; }
#doc-modal-body.rendered h3 { font-size: 18px; color: #e5e7eb; margin: 16px 0 8px; }
#doc-modal-body.rendered h4 { font-size: 16px; color: #e5e7eb; margin: 14px 0 6px; }
#doc-modal-body.rendered p { margin: 10px 0; }
#doc-modal-body.rendered ul, #doc-modal-body.rendered ol { margin: 10px 0 10px 24px; }
#doc-modal-body.rendered li { margin: 4px 0; }
#doc-modal-body.rendered strong { color: #f3f4f6; }
#doc-modal-body.rendered em { color: #e5e7eb; }
#doc-modal-body.rendered a { color: #60a5fa; text-decoration: none; }
#doc-modal-body.rendered a:hover { text-decoration: underline; }
#doc-modal-body.rendered code {
  background: #1f2937; color: #fcd34d; padding: 2px 6px; border-radius: 4px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px;
}
#doc-modal-body.rendered pre {
  background: #0a0a14; border: 1px solid #222; border-radius: 8px;
  padding: 14px 16px; overflow-x: auto; margin: 12px 0;
}
#doc-modal-body.rendered pre code { background: transparent; padding: 0; color: #d1d5db; }
#doc-modal-body.rendered blockquote {
  border-left: 3px solid #374151; padding: 4px 14px; margin: 10px 0;
  color: #9ca3af;
}
#doc-modal-body.rendered hr { border: none; border-top: 1px solid #222; margin: 18px 0; }
#doc-modal-body.rendered table { border-collapse: collapse; margin: 12px 0; width: 100%; }
#doc-modal-body.rendered th, #doc-modal-body.rendered td {
  border: 1px solid #2a2a3a; padding: 8px 12px; text-align: left;
}
#doc-modal-body.rendered th { background: #1a1a2e; color: #e5e7eb; }
#doc-view-toggle {
  background: #374151; color: #e5e7eb; font-size: 13px; font-weight: 600;
  padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer;
  margin-right: 12px;
}
#doc-view-toggle:hover { background: #4b5563; }
#version-badge {
  font-size: 16px; color: #6b7280; font-weight: 500; margin-left: 10px;
  vertical-align: middle;
}
#wiki-btn { background: #0ea5e9; }
#wiki-btn:hover { background: #0284c7; }
#settings-panel label { display: block; font-size: 14px; color: #9ca3af; margin: 10px 0 4px; }
#settings-panel input[type="text"],
#settings-panel select {
  width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333;
  background: #111827; color: #d1d5db; font-size: 14px; font-family: inherit; outline: none;
}
#settings-panel input[type="text"]:focus,
#settings-panel select:focus { border-color: #2563eb; }
#settings-panel .settings-save-btn {
  margin-top: 14px; padding: 10px 20px; font-size: 14px; border-radius: 8px;
  border: none; background: #2563eb; color: #fff; cursor: pointer;
  font-weight: 600; transition: background 0.2s;
}
#settings-panel .settings-save-btn:hover { background: #1d4ed8; }

/* Location list panel */
#location-panel {
  display: none; width: 100%; max-width: 500px;
  margin-top: 4px;
}
#location-list {
  max-height: 260px; overflow-y: auto; background: #111827;
  border: 1px solid #333; border-radius: 10px; margin-bottom: 10px;
  scrollbar-width: thin; scrollbar-color: #444 #111827;
}
#location-list::-webkit-scrollbar { width: 8px; }
#location-list::-webkit-scrollbar-track { background: #111827; }
#location-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
.loc-item {
  padding: 14px 18px; font-size: 22px; color: #d1d5db; cursor: pointer;
  border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
}
.loc-item:last-child { border-bottom: none; }
.loc-item:hover { background: #1e293b; }
.loc-item.active { background: #1e3a5f; color: #93c5fd; }
.loc-item .loc-num { color: #6b7280; font-size: 18px; min-width: 28px; }
.loc-item .loc-text { flex: 1; }
.loc-item .loc-del {
  color: #6b7280; font-size: 18px; padding: 2px 6px; border-radius: 4px;
  cursor: pointer; transition: color 0.15s, background 0.15s;
  flex-shrink: 0; line-height: 1;
}
.loc-item .loc-del:hover { color: #ef4444; background: rgba(239,68,68,0.15); }
#list-controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
#list-controls button { font-size: 22px; padding: 16px 24px; }
#go-there-btn { background: #059669; }
#go-there-btn:hover { background: #047857; }
#next-loc-btn { background: #7c3aed; }
#next-loc-btn:hover { background: #6d28d9; }
#list-status { font-size: 20px; color: #6b7280; }

/* Zoom slider */
#zoom-slider-row {
  display: flex; align-items: center; gap: 14px; font-size: 20px; color: #9ca3af;
  flex-wrap: wrap;
}
#zoom-slider {
  -webkit-appearance: none; appearance: none; width: 100%; height: 10px;
  background: #333; border-radius: 5px; outline: none;
}
#zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
  background: #2563eb; cursor: pointer;
}
#zoom-slider::-moz-range-thumb {
  width: 26px; height: 26px; border-radius: 50%;
  background: #2563eb; cursor: pointer; border: none;
}
</style>
</head>
<body>

<button id="settings-toggle" title="Settings">
  <span class="bar"></span><span class="bar"></span><span class="bar"></span>
</button>
<div id="settings-panel">
  <h3>AI Gateway Settings</h3>
  <label for="settings-endpoint">Gateway Endpoint</label>
  <input id="settings-endpoint" type="text" />
  <label for="settings-model">Model</label>
  <input id="settings-model" type="text" />
  <button class="settings-save-btn" id="settings-save-btn">Save</button>
  <hr class="panel-divider" style="margin-top:18px;" />
  <h3 style="margin-top:6px;">Documentation</h3>
  <button class="doc-btn" id="open-guide-btn">📖 User Guide</button>
  <button class="doc-btn" id="open-prd-btn">📋 Product Requirements (PRD)</button>
</div>

<div id="doc-modal">
  <div id="doc-modal-content">
    <div id="doc-modal-header">
      <h3 id="doc-modal-title">Document</h3>
      <div style="display:flex; align-items:center;">
        <button id="doc-view-toggle" title="Toggle between formatted and raw markdown">Show Markdown</button>
        <button id="doc-modal-close" title="Close">&times;</button>
      </div>
    </div>
    <div id="doc-modal-body"></div>
  </div>
</div>

<div id="main-area">
  <div id="globe-container">
    <canvas id="globe"></canvas>
  </div>
  <div id="map-container">
    <canvas id="map-canvas"></canvas>
    <div id="crosshair"></div>
    <div id="map-controls">
      <button id="zoom-in-btn" title="Zoom in">+</button>
      <button id="zoom-out-btn" title="Zoom out">&minus;</button>
      <button id="back-btn" title="Back to globe">&#x1f310;</button>
    </div>
  </div>
</div>

<div id="side-panel">
  <div class="panel-section">
    <h2>Go to Location<span id="version-badge">v0.1</span></h2>
    <input id="location-input" type="text" placeholder="Enter lat,lng or address..." />
    <div id="go-row">
      <button id="go-btn">Go</button>
      <button id="map-btn">Map</button>
    </div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>Zoom Level</h2>
    <div id="zoom-slider-row">
      <label for="zoom-slider">Initial zoom:</label>
      <input id="zoom-slider" type="range" min="1.2" max="2.8" step="0.1" value="1.8" />
      <span id="zoom-label">Medium</span>
    </div>
    <div id="zoom-slider-row" style="margin-top:10px;">
      <label for="star-size-slider">Star size:</label>
      <input id="star-size-slider" type="range" min="0.03" max="0.2" step="0.005" value="0.12" />
      <span id="star-size-label">Medium</span>
    </div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>Location List</h2>
    <div id="drop-zone">Drop a file with locations</div>
    <div id="location-panel">
      <div id="location-list"></div>
      <div id="list-controls">
        <button id="go-there-btn">Go There</button>
        <button id="next-loc-btn">Next Location</button>
        <span id="list-status"></span>
      </div>
      <div id="list-controls" style="margin-top:10px;">
        <button id="wiki-btn">Open Wikipedia</button>
      </div>
    </div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>YouTube Video</h2>
    <div id="yt-drop-zone">Drop a YouTube link here, or click to paste</div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>Paste Transcript</h2>
    <textarea id="paste-transcript" placeholder="Paste transcript or any text here&#10;(timestamps will be stripped automatically)"></textarea>
    <button id="process-text-btn">Process Text for Places</button>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>AI Place Finder</h2>
    <textarea id="ai-prompt-input" placeholder="Describe the places you want, e.g.&#10;&quot;State capitals from A through G&quot;&#10;&quot;Famous beaches in Southeast Asia&quot;"></textarea>
    <button id="create-list-btn">Create List</button>
  </div>

  <div id="status"></div>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
const state = {
  mode: 'globe',           // 'globe' | 'zooming' | 'paused' | 'map'
  targetLat: null,
  targetLng: null,
  currentLat: 0,
  currentLng: 0,
  autoRotate: true,
  zoomLevel: 1,
  mapZoom: 12,
  mapCenterLat: 0,
  mapCenterLng: 0,
  dragStart: null,
  dragOffset: { x: 0, y: 0 },
};

// ============================================================
//  THREE.JS GLOBE SETUP
// ============================================================
const container = document.getElementById('globe-container');
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 4.0);

// Lights
scene.add(new THREE.AmbientLight(0x444466, 1.2));
const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// Earth sphere
const earthGeom = new THREE.SphereGeometry(1, 64, 64);
let earthMat, earthMesh, cloudMesh;

// Create a procedural earth texture as fallback, but try loading real one
function createProceduralTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');

  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#1a3a5c');
  grad.addColorStop(0.3, '#1e4d7a');
  grad.addColorStop(0.5, '#1565a0');
  grad.addColorStop(0.7, '#1e4d7a');
  grad.addColorStop(1, '#1a3a5c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 512);

  // Simplified continent shapes (rough outlines)
  ctx.fillStyle = '#2d7a3a';
  const continents = [
    // North America
    [[200,80],[260,80],[290,110],[300,140],[280,170],[260,200],[230,210],[200,190],[180,150],[170,120],[185,90]],
    // South America
    [[250,220],[275,230],[290,260],[295,300],[280,350],[260,370],[240,360],[230,320],[235,280],[240,240]],
    // Europe
    [[470,80],[520,75],[540,90],[530,110],[510,130],[490,140],[470,130],[460,110],[465,90]],
    // Africa
    [[470,150],[510,140],[540,160],[555,200],[550,250],[540,300],[520,330],[490,340],[470,310],[460,270],[455,220],[460,180]],
    // Asia
    [[530,60],[620,50],[700,55],[740,70],[750,100],[730,130],[700,150],[660,160],[620,170],[580,160],[550,140],[530,110],[520,80]],
    // India
    [[610,170],[630,175],[635,210],[620,240],[605,230],[600,195]],
    // Australia
    [[700,280],[750,275],[770,290],[775,310],[760,330],[730,335],[710,320],[700,300]],
    // Greenland
    [[310,40],[350,35],[360,55],[345,70],[320,72],[305,60]],
    // Antarctica
    [[100,460],[300,470],[500,465],[700,470],[900,460],[950,490],[950,512],[50,512],[50,490]],
    // Southeast Asia islands
    [[720,180],[735,178],[740,195],[728,200],[718,192]],
    [[750,200],[768,195],[772,212],[755,218],[748,210]],
  ];

  continents.forEach(pts => {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = '#2d7a3a';
    ctx.fill();
    // Add some terrain variation
    ctx.fillStyle = 'rgba(60,130,60,0.3)';
    ctx.fill();
  });

  // Ice caps
  ctx.fillStyle = 'rgba(220,235,245,0.7)';
  ctx.fillRect(0, 0, 1024, 25);
  ctx.fillRect(0, 487, 1024, 25);

  // Latitude/longitude grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = 0; lat < 512; lat += 512/18) {
    ctx.beginPath(); ctx.moveTo(0, lat); ctx.lineTo(1024, lat); ctx.stroke();
  }
  for (let lng = 0; lng < 1024; lng += 1024/36) {
    ctx.beginPath(); ctx.moveTo(lng, 0); ctx.lineTo(lng, 512); ctx.stroke();
  }

  return new THREE.CanvasTexture(c);
}

function initEarth(texture) {
  earthMat = new THREE.MeshPhongMaterial({
    map: texture,
    specular: new THREE.Color(0x222244),
    shininess: 15,
  });
  earthMesh = new THREE.Mesh(earthGeom, earthMat);
  scene.add(earthMesh);

  // Atmosphere glow
  const atmosGeom = new THREE.SphereGeometry(1.02, 64, 64);
  const atmosMat = new THREE.MeshPhongMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.08,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(atmosGeom, atmosMat));

  // Stars
  const starsGeom = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 2000; i++) {
    const r = 50 + Math.random() * 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  }
  starsGeom.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  scene.add(new THREE.Points(starsGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })));
}

// ============================================================
//  GLOBE ROTATION / ANIMATION
// ============================================================
function latLngToRotation(lat, lng) {
  // Three.js sphere: texture maps with phi along Y axis
  // We rotate the sphere so the target lat/lng faces camera
  const phi = THREE.MathUtils.degToRad(lat);
  const theta = -THREE.MathUtils.degToRad(lng) - Math.PI / 2;
  return { x: phi, y: theta };
}

let rotationSpeed = 0.002;
let animating = false;
let animStartTime = 0;
let animStartRot = { x: 0, y: 0 };
let animTargetRot = { x: 0, y: 0 };
let animDuration = 2000;
let zoomAnimating = false;
let zoomStart = 4.0;
let zoomTarget = 4.0;
let zoomStartTime = 0;
let zoomDuration = 1500;

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
}

function shortestAngleDist(from, to) {
  let d = ((to - from) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
  return d;
}

// ============================================================
//  GOLD STAR MARKER
// ============================================================
let starMarker = null;
let starSize = 0.12;

function createStarTexture() {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // Draw a 5-pointed star
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.42, innerR = size * 0.18;
  const points = 5;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR * 1.3);
  glow.addColorStop(0, 'rgba(255, 215, 0, 0.5)');
  glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Star shape
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Gold gradient fill
  const grad = ctx.createLinearGradient(cx - outerR, cy - outerR, cx + outerR, cy + outerR);
  grad.addColorStop(0, '#ffd700');
  grad.addColorStop(0.5, '#fff4a3');
  grad.addColorStop(1, '#ffa500');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#b8860b';
  ctx.lineWidth = 2;
  ctx.stroke();

  return new THREE.CanvasTexture(c);
}

function placeStarAt(lat, lng) {
  if (!earthMesh) return;

  // Remove old star
  if (starMarker && starMarker.parent) {
    starMarker.parent.remove(starMarker);
  }

  // Convert lat/lng to local sphere position.
  // From latLngToRotation: rotating y by -deg(lng)-PI/2 brings the point to +Z.
  // So in local space: lng=0 is at +X, lng=90 is at -Z, lat=90 is at +Y.
  const R = 1.03;
  const latRad = THREE.MathUtils.degToRad(lat);
  const lngRad = THREE.MathUtils.degToRad(lng);
  const x = R * Math.cos(latRad) * Math.cos(lngRad);
  const y = R * Math.sin(latRad);
  const z = -R * Math.cos(latRad) * Math.sin(lngRad);

  if (!starMarker) {
    const starTex = createStarTexture();
    const starMat = new THREE.SpriteMaterial({
      map: starTex,
      transparent: true,
      depthTest: false,
    });
    starMarker = new THREE.Sprite(starMat);
  }
  starMarker.scale.set(starSize, starSize, 1);

  starMarker.position.set(x, y, z);
  earthMesh.add(starMarker);
}

function removeStarMarker() {
  if (starMarker && starMarker.parent) {
    starMarker.parent.remove(starMarker);
  }
}

function animateToLocation(lat, lng) {
  if (!earthMesh) return;
  state.autoRotate = false;
  state.targetLat = lat;
  state.targetLng = lng;

  // Place gold star at this location
  placeStarAt(lat, lng);

  const target = latLngToRotation(lat, lng);
  animStartRot = { x: earthMesh.rotation.x, y: earthMesh.rotation.y };
  animTargetRot = {
    x: animStartRot.x + shortestAngleDist(animStartRot.x, target.x),
    y: animStartRot.y + shortestAngleDist(animStartRot.y, target.y)
  };
  animDuration = 2000;
  animStartTime = performance.now();
  animating = true;

  // After rotation completes, zoom in using slider value
  setTimeout(() => {
    zoomStart = camera.position.z;
    zoomTarget = getInitialZoom();
    zoomStartTime = performance.now();
    zoomDuration = 2000;
    zoomAnimating = true;

    setTimeout(() => {
      state.mode = 'paused';
      document.getElementById('map-btn').style.display = 'inline-block';
      setStatus('Location centered. Click "Map" to see the map view.');
    }, 2200);
  }, 2200);

  setStatus('Rotating to location...');
  state.mode = 'zooming';
}

// ============================================================
//  RENDER LOOP
// ============================================================
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', () => { resize(); resizeMap(); });
resize();

function renderGlobe(time) {
  if (!earthMesh) return;

  if (state.autoRotate) {
    earthMesh.rotation.y += rotationSpeed;
  }

  if (animating) {
    const elapsed = time - animStartTime;
    const t = Math.min(elapsed / animDuration, 1);
    const e = easeInOutCubic(t);
    earthMesh.rotation.x = animStartRot.x + (animTargetRot.x - animStartRot.x) * e;
    earthMesh.rotation.y = animStartRot.y + (animTargetRot.y - animStartRot.y) * e;
    if (t >= 1) animating = false;
  }

  if (zoomAnimating) {
    const elapsed = time - zoomStartTime;
    const t = Math.min(elapsed / zoomDuration, 1);
    const e = easeInOutCubic(t);
    camera.position.z = zoomStart + (zoomTarget - zoomStart) * e;
    if (t >= 1) zoomAnimating = false;
  }

  renderer.render(scene, camera);
}

function animate(time) {
  requestAnimationFrame(animate);
  if (state.mode !== 'map') {
    renderGlobe(time);
  }
}
requestAnimationFrame(animate);

// ============================================================
//  GEOCODING
// ============================================================
function parseLatLng(input) {
  // Try parsing as lat,lng
  const match = input.match(/^\s*(-?\d+\.?\d*)\s*[,\s]\s*(-?\d+\.?\d*)\s*$/);
  if (match) {
    const lat = parseFloat(match[1]);
    const lng = parseFloat(match[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
      return { lat, lng };
    }
  }
  return null;
}

async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
  const resp = await fetch(url, {
    headers: { 'User-Agent': 'EarthExplorer/1.0' }
  });
  const data = await resp.json();
  if (data.length > 0) {
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
  }
  return null;
}

// ============================================================
//  MAP VIEW (OpenStreetMap tiles on Canvas)
// ============================================================
const mapCanvas = document.getElementById('map-canvas');
const mapCtx = mapCanvas.getContext('2d');
const tileCache = {};
const TILE_SIZE = 256;

function resizeMap() {
  const mc = document.getElementById('map-container');
  mapCanvas.width = mc.clientWidth * window.devicePixelRatio;
  mapCanvas.height = mc.clientHeight * window.devicePixelRatio;
  mapCanvas.style.width = mc.clientWidth + 'px';
  mapCanvas.style.height = mc.clientHeight + 'px';
  mapCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}

function lngToTileX(lng, zoom) {
  return ((lng + 180) / 360) * Math.pow(2, zoom);
}

function latToTileY(lat, zoom) {
  const r = Math.PI / 180 * lat;
  return (1 - Math.log(Math.tan(r) + 1/Math.cos(r)) / Math.PI) / 2 * Math.pow(2, zoom);
}

function getTile(x, y, z) {
  const key = `${z}/${x}/${y}`;
  if (tileCache[key]) return tileCache[key];

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
  const entry = { img, loaded: false };
  img.onload = () => { entry.loaded = true; renderMap(); };
  img.onerror = () => { entry.failed = true; };
  tileCache[key] = entry;
  return entry;
}

function renderMap() {
  if (state.mode !== 'map') return;

  const w = mapCanvas.width / window.devicePixelRatio;
  const h = mapCanvas.height / window.devicePixelRatio;
  const zoom = state.mapZoom;

  mapCtx.fillStyle = '#1a1a2e';
  mapCtx.fillRect(0, 0, w, h);

  const centerTileX = lngToTileX(state.mapCenterLng, zoom);
  const centerTileY = latToTileY(state.mapCenterLat, zoom);

  const offsetX = (centerTileX % 1) * TILE_SIZE;
  const offsetY = (centerTileY % 1) * TILE_SIZE;

  const baseTileX = Math.floor(centerTileX);
  const baseTileY = Math.floor(centerTileY);

  const tilesX = Math.ceil(w / TILE_SIZE) + 2;
  const tilesY = Math.ceil(h / TILE_SIZE) + 2;

  const startX = -Math.floor(tilesX / 2) - 1;
  const startY = -Math.floor(tilesY / 2) - 1;
  const maxTile = Math.pow(2, zoom);

  for (let dx = startX; dx <= startX + tilesX + 1; dx++) {
    for (let dy = startY; dy <= startY + tilesY + 1; dy++) {
      const tx = ((baseTileX + dx) % maxTile + maxTile) % maxTile;
      const ty = baseTileY + dy;
      if (ty < 0 || ty >= maxTile) continue;

      const screenX = w/2 + dx * TILE_SIZE - offsetX;
      const screenY = h/2 + dy * TILE_SIZE - offsetY;

      const tile = getTile(tx, ty, zoom);
      if (tile.loaded) {
        mapCtx.drawImage(tile.img, screenX, screenY, TILE_SIZE, TILE_SIZE);
      } else {
        mapCtx.fillStyle = '#1e293b';
        mapCtx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        mapCtx.strokeStyle = '#2d3a4e';
        mapCtx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Center marker
  mapCtx.save();
  mapCtx.beginPath();
  mapCtx.arc(w/2, h/2, 6, 0, Math.PI * 2);
  mapCtx.fillStyle = 'rgba(239, 68, 68, 0.9)';
  mapCtx.fill();
  mapCtx.strokeStyle = '#fff';
  mapCtx.lineWidth = 2;
  mapCtx.stroke();
  mapCtx.restore();

  // Attribution
  mapCtx.save();
  mapCtx.fillStyle = 'rgba(0,0,0,0.5)';
  mapCtx.fillRect(0, h - 18, w, 18);
  mapCtx.fillStyle = '#aaa';
  mapCtx.font = '10px sans-serif';
  mapCtx.fillText('\u00A9 OpenStreetMap contributors', 4, h - 5);
  mapCtx.restore();
}

// Map panning
let mapDragging = false;
let mapDragStartX = 0, mapDragStartY = 0;
let mapDragStartLat = 0, mapDragStartLng = 0;

function tileXToLng(x, zoom) {
  return x / Math.pow(2, zoom) * 360 - 180;
}

function tileYToLat(y, zoom) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom);
  return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

mapCanvas.addEventListener('mousedown', (e) => {
  mapDragging = true;
  mapDragStartX = e.clientX;
  mapDragStartY = e.clientY;
  mapDragStartLat = state.mapCenterLat;
  mapDragStartLng = state.mapCenterLng;
});

window.addEventListener('mousemove', (e) => {
  if (!mapDragging) return;
  const dx = e.clientX - mapDragStartX;
  const dy = e.clientY - mapDragStartY;
  const zoom = state.mapZoom;
  const scale = TILE_SIZE * Math.pow(2, zoom);

  const startTileX = lngToTileX(mapDragStartLng, zoom);
  const startTileY = latToTileY(mapDragStartLat, zoom);

  const newTileX = startTileX - dx / TILE_SIZE;
  const newTileY = startTileY - dy / TILE_SIZE;

  state.mapCenterLng = tileXToLng(newTileX, zoom);
  state.mapCenterLat = tileYToLat(newTileY, zoom);

  renderMap();
});

window.addEventListener('mouseup', () => { mapDragging = false; });

mapCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0 && state.mapZoom < 18) { state.mapZoom++; renderMap(); }
  else if (e.deltaY > 0 && state.mapZoom > 2) { state.mapZoom--; renderMap(); }
}, { passive: false });

// Touch support for map
let touchStartDist = 0;
let touchStartZoom = 0;

mapCanvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    mapDragging = true;
    mapDragStartX = e.touches[0].clientX;
    mapDragStartY = e.touches[0].clientY;
    mapDragStartLat = state.mapCenterLat;
    mapDragStartLng = state.mapCenterLng;
  } else if (e.touches.length === 2) {
    mapDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx + dy*dy);
    touchStartZoom = state.mapZoom;
  }
  e.preventDefault();
}, { passive: false });

mapCanvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && mapDragging) {
    const dx = e.touches[0].clientX - mapDragStartX;
    const dy = e.touches[0].clientY - mapDragStartY;
    const zoom = state.mapZoom;
    const startTileX = lngToTileX(mapDragStartLng, zoom);
    const startTileY = latToTileY(mapDragStartLat, zoom);
    state.mapCenterLng = tileXToLng(startTileX - dx / TILE_SIZE, zoom);
    state.mapCenterLat = tileYToLat(startTileY - dy / TILE_SIZE, zoom);
    renderMap();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const zoomDelta = Math.round(Math.log2(dist / touchStartDist));
    const newZoom = Math.min(18, Math.max(2, touchStartZoom + zoomDelta));
    if (newZoom !== state.mapZoom) { state.mapZoom = newZoom; renderMap(); }
  }
  e.preventDefault();
}, { passive: false });

mapCanvas.addEventListener('touchend', () => { mapDragging = false; });

function showMap() {
  state.mode = 'map';
  state.mapCenterLat = state.targetLat;
  state.mapCenterLng = state.targetLng;
  state.mapZoom = 12;

  document.getElementById('globe-container').style.display = 'none';

function showGlobe() {

  state.autoRotate = true;

  // Reset zoom
  camera.position.z = 4.0;
  zoomAnimating = false;

  document.getElementById('globe-container').style.display = 'block';
  document.getElementById('map-container').style.display = 'none';

}

const input = document.getElementById('location-input');
const goBtn = document.getElementById('go-btn');
const mapBtn = document.getElementById('map-btn');
const backBtn = document.getElementById('back-btn');
const zoomInBtn = document.getElementById('zoom-in-btn');
const zoomOutBtn = document.getElementById('zoom-out-btn');

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

goBtn.addEventListener('click', handleGo);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleGo(); });

async function handleGo() {
  const val = input.value.trim();
  if (!val) return;

  // If in map mode, go back to globe first
  if (state.mode === 'map') {
    showGlobe();
    await new Promise(r => setTimeout(r, 300));
  }

  goBtn.disabled = true;
  mapBtn.style.display = 'none';
  setStatus('Looking up location...');

  let result = parseLatLng(val);
  if (result) {
    setStatus(`Going to ${result.lat.toFixed(4)}, ${result.lng.toFixed(4)}`);
    currentLocationName = null;
  } else {
    result = await geocode(val);
    if (!result) {
      setStatus('Location not found. Try coordinates like "48.8566, 2.3522" or a city name.');
      goBtn.disabled = false;
      return;
    }
    setStatus(`Found: ${result.name ? result.name.split(',').slice(0,3).join(',') : val}`);
    currentLocationName = result.name || val;
  }

  goBtn.disabled = false;
  animateToLocation(result.lat, result.lng);
}

mapBtn.addEventListener('click', showMap);
backBtn.addEventListener('click', showGlobe);

zoomInBtn.addEventListener('click', () => {
  if (state.mapZoom < 18) {
    state.mapZoom++;
    renderMap();
    setStatus(`Map view \u2014 zoom ${state.mapZoom}`);
  }
});

zoomOutBtn.addEventListener('click', () => {
  if (state.mapZoom > 2) {
    state.mapZoom--;
    renderMap();
    setStatus(`Map view \u2014 zoom ${state.mapZoom}`);
  }
});

// ============================================================
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

function getInitialZoom() {
  // Slider goes from 1.2 (close) to 2.8 (far). Camera default is 4.0.
  // Lower value = more zoomed in
  return parseFloat(zoomSlider.value);
}

function updateZoomLabel() {
  const v = parseFloat(zoomSlider.value);
  if (v <= 1.5) zoomLabel.textContent = 'Very close';
  else if (v <= 1.8) zoomLabel.textContent = 'Close';
  else if (v <= 2.1) zoomLabel.textContent = 'Medium';
  else if (v <= 2.5) zoomLabel.textContent = 'Far';
  else zoomLabel.textContent = 'Very far';
}
zoomSlider.addEventListener('input', updateZoomLabel);
updateZoomLabel();

// Star size slider
const starSizeSlider = document.getElementById('star-size-slider');
const starSizeLabel = document.getElementById('star-size-label');
function updateStarSizeLabel() {
  const v = parseFloat(starSizeSlider.value);
  starSize = v;
  if (v <= 0.05) starSizeLabel.textContent = 'Small';
  else if (v <= 0.09) starSizeLabel.textContent = 'Smallish';
  else if (v <= 0.13) starSizeLabel.textContent = 'Medium';
  else if (v <= 0.17) starSizeLabel.textContent = 'Large';
  else starSizeLabel.textContent = 'Very large';
  if (starMarker) starMarker.scale.set(starSize, starSize, 1);
}
starSizeSlider.addEventListener('input', updateStarSizeLabel);
updateStarSizeLabel();

// ============================================================
//  DOC MODAL (User Guide / PRD)
// ============================================================
const docModal = document.getElementById('doc-modal');
const docModalTitle = document.getElementById('doc-modal-title');
const docModalBody = document.getElementById('doc-modal-body');
const docViewToggle = document.getElementById('doc-view-toggle');
let docRawSource = '';
let docViewMode = 'rendered'; // 'rendered' | 'raw'

function applyDocView() {
  if (docViewMode === 'rendered') {
    docModalBody.classList.remove('raw');
    docModalBody.classList.add('rendered');
    if (window.marked) {
      docModalBody.innerHTML = marked.parse(docRawSource);
      // Make any links inside the modal open in a new tab.
      docModalBody.querySelectorAll('a').forEach(a => {
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
      });
    } else {
      docModalBody.textContent = docRawSource;
    }
    docViewToggle.textContent = 'Show Markdown';
  } else {
    docModalBody.classList.remove('rendered');
    docModalBody.classList.add('raw');
    docModalBody.textContent = docRawSource;
    docViewToggle.textContent = 'Show Formatted';
  }
}

async function openDoc(file, title) {
  docModalTitle.textContent = title;
  docRawSource = 'Loading…';
  docViewMode = 'rendered';
  docModalBody.classList.remove('raw', 'rendered');
  docModalBody.textContent = 'Loading…';
  docModal.classList.add('open');
  try {
    const res = await fetch(file + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    docRawSource = await res.text();
    applyDocView();
  } catch (err) {
    docRawSource = 'Failed to load ' + file + ': ' + err.message;
    docModalBody.textContent = docRawSource;
  }
}
docViewToggle.addEventListener('click', () => {
  docViewMode = (docViewMode === 'rendered') ? 'raw' : 'rendered';

let currentLocationName = null;
// US state name set — used to disambiguate Nominatim display_names into
// "City, State" form, which matches Wikipedia's article-title convention.
const US_STATES = new Set([
  'Alabama','Alaska','Arizona','Arkansas','California','Colorado','Connecticut',
  'Delaware','Florida','Georgia','Hawaii','Idaho','Illinois','Indiana','Iowa',
  'Kansas','Kentucky','Louisiana','Maine','Maryland','Massachusetts','Michigan',
  'Minnesota','Mississippi','Missouri','Montana','Nebraska','Nevada',
  'New Hampshire','New Jersey','New Mexico','New York','North Carolina',
  'North Dakota','Ohio','Oklahoma','Oregon','Pennsylvania','Rhode Island',
  'South Carolina','South Dakota','Tennessee','Texas','Utah','Vermont',
  'Virginia','Washington','West Virginia','Wisconsin','Wyoming',
  'District of Columbia'
]);

function buildWikiQuery(displayName) {
  if (!displayName) return '';
  // Nominatim display_name is comma-separated, coarse → fine-grained usually goes
  // "<place>, <admin1>, <admin2>, ..., <postcode?>, <country>".
  const parts = displayName.split(',').map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return displayName;
  if (parts.length === 1) return parts[0];

  const place = parts[0];
  const country = parts[parts.length - 1];

  // US: look for a state name in the middle parts → "City, State"
  if (country === 'United States' || country === 'USA') {
    const state = parts.find(p => US_STATES.has(p));
    if (state) return `${place}, ${state}`;
  }

  // Otherwise pair the place with its country — "Paris, France", "Tokyo, Japan".
  // Skip postcodes (purely numeric) when they happen to land on the end.
  if (/^\d[\d\s-]*$/.test(country) && parts.length >= 3) {
    return `${place}, ${parts[parts.length - 2]}`;
  }
  return `${place}, ${country}`;
}

document.getElementById('wiki-btn').addEventListener('click', () => {
  if (!currentLocationName) {
    setStatus('Go to a location first, then Open Wikipedia.');
    return;
  }
  const query = buildWikiQuery(currentLocationName);
  // go=Go makes Wikipedia jump straight to the article if the title matches,
  // and fall back to the search results page otherwise.
  const url = 'https://en.wikipedia.org/w/index.php?search=' +
              encodeURIComponent(query) + '&go=Go';
  const win = window.open(url, '_blank');
  if (win) win.focus();
});

const locationList = [];
let currentLocIndex = -1;

const dropZone = document.getElementById('drop-zone');
const locPanel = document.getElementById('location-panel');
const locListEl = document.getElementById('location-list');
const goThereBtn = document.getElementById('go-there-btn');
const nextLocBtn = document.getElementById('next-loc-btn');
const listStatus = document.getElementById('list-status');

// Prevent default drag behavior on the whole page
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  document.body.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); });
});

dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-over'));
dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', handleFileDrop);

// Also allow clicking the drop zone to pick a file
dropZone.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.txt,.csv,.text';
  inp.onchange = (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  };
  inp.click();
});

function handleFileDrop(e) {
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length === 0) {
      setStatus('File was empty or had no valid lines.');
      return;
    }
    locationList.length = 0;
    lines.forEach(l => locationList.push(l));
    currentLocIndex = 0;
    dropZone.classList.add('loaded');
    dropZone.textContent = `${locationList.length} locations loaded`;
    renderLocationList();
    locPanel.style.display = 'block';
    updateListStatus();
    setStatus(`Loaded ${locationList.length} locations from "${file.name}". Select one or click Next.`);
  };
  reader.readAsText(file);
}

function renderLocationList() {
  locListEl.innerHTML = '';
  locationList.forEach((loc, i) => {
    const div = document.createElement('div');
    div.className = 'loc-item' + (i === currentLocIndex ? ' active' : '');
    div.innerHTML = `<span class="loc-num">${i + 1}</span><span class="loc-text">${escapeHtml(loc)}</span><span class="loc-del" title="Remove this place">\u2715</span>`;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('loc-del')) return; // handled by delete
      currentLocIndex = i;
      highlightActive();
      updateListStatus();
    });
    div.addEventListener('dblclick', (e) => {
      if (e.target.classList.contains('loc-del')) return;
      goToListLocation(i);
    });
    div.querySelector('.loc-del').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteLocation(i);
    });
    locListEl.appendChild(div);
  });
  scrollToActive();
}

function deleteLocation(index) {
  locationList.splice(index, 1);
  if (locationList.length === 0) {
    currentLocIndex = -1;
    locPanel.style.display = 'none';
    dropZone.classList.remove('loaded');
    dropZone.textContent = 'Drop a file with locations';
    ytDropZone.classList.remove('loaded');
    ytDropZone.textContent = 'Drop a YouTube link here, or click to paste';
    setStatus('All locations removed.');
    return;
  }
  if (currentLocIndex >= locationList.length) {
    currentLocIndex = locationList.length - 1;
  }
  renderLocationList();
  updateListStatus();
}

function highlightActive() {
  const items = locListEl.querySelectorAll('.loc-item');
  items.forEach((el, i) => {
    el.classList.toggle('active', i === currentLocIndex);
  });
  scrollToActive();
}

function scrollToActive() {
  const active = locListEl.querySelector('.loc-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateListStatus() {
  if (locationList.length === 0) {
    listStatus.textContent = '';
  } else {
    listStatus.textContent = `${currentLocIndex + 1} of ${locationList.length}`;
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function goToListLocation(index) {
  if (index < 0 || index >= locationList.length) return;
  currentLocIndex = index;
  highlightActive();
  updateListStatus();

  const val = locationList[index];

  // If in map mode, go back to globe first
  if (state.mode === 'map') {
    showGlobe();
    await new Promise(r => setTimeout(r, 300));
  }

  goThereBtn.disabled = true;
  nextLocBtn.disabled = true;
  goBtn.disabled = true;
  setStatus(`Looking up: ${val}`);

  let result = parseLatLng(val);
  if (result) {
    setStatus(`Going to ${result.lat.toFixed(4)}, ${result.lng.toFixed(4)}`);
    currentLocationName = val;
  } else {
    result = await geocode(val);
    if (!result) {
      setStatus(`Could not find "${val}". Try the next location.`);
      goThereBtn.disabled = false;
      nextLocBtn.disabled = false;
      goBtn.disabled = false;
      return;
    }
    setStatus(`Found: ${result.name ? result.name.split(',').slice(0,3).join(',') : val}`);
    currentLocationName = result.name || val;
  }

  goThereBtn.disabled = false;
  nextLocBtn.disabled = false;
  goBtn.disabled = false;
  animateToLocation(result.lat, result.lng);
}

goThereBtn.addEventListener('click', () => {
  if (locationList.length > 0 && currentLocIndex >= 0) {
    goToListLocation(currentLocIndex);
  }
});

nextLocBtn.addEventListener('click', () => {
  if (locationList.length === 0) return;
  let next = currentLocIndex + 1;
  if (next >= locationList.length) next = 0; // wrap around
  goToListLocation(next);
});

function extractVideoId(input) {
  input = input.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return null;
}

async function fetchTranscript(videoId) {
  const errors = []; // collect diagnostic info from each attempt

  // ---- Strategy 1: Invidious API (CORS-friendly, purpose-built) ----
  const invidiousInstances = [
    'https://inv.nadeko.net',
    'https://invidious.nerdvpn.de',
    'https://iv.ggtyler.dev',
    'https://invidious.privacyredirect.com',
    'https://yt.cdaut.de',
  ];

  for (const instance of invidiousInstances) {
    try {
      // Step 1: get list of caption tracks
      const listResp = await fetch(`${instance}/api/v1/captions/${videoId}`, {
        signal: AbortSignal.timeout(8000)
      });
      if (!listResp.ok) {
        errors.push(`${instance}: caption list returned HTTP ${listResp.status}`);
        continue;
      }
      const data = await listResp.json();
      const captions = data.captions || [];
      if (captions.length === 0) {
        errors.push(`${instance}: video has no caption tracks listed`);
        continue;
      }

      // Pick best caption track — prefer manual English, then auto-English, then first
      const track = captions.find(c => c.language_code === 'en' && !/auto/i.test(c.label))
                 || captions.find(c => c.language_code === 'en')
                 || captions.find(c => (c.language_code || '').startsWith('en'))
                 || captions[0];

      // Step 2: fetch the actual caption text
      const label = encodeURIComponent(track.label);
      const capResp = await fetch(`${instance}/api/v1/captions/${videoId}?label=${label}`, {
        signal: AbortSignal.timeout(10000)
      });
      if (!capResp.ok) {
        errors.push(`${instance}: caption content returned HTTP ${capResp.status}`);
        continue;
      }
      const capText = await capResp.text();

      // Parse — Invidious returns VTT format
      const lines = capText.split('\n');
      const textLines = lines.filter(l =>
        l.trim() &&
        !/^WEBVTT/.test(l) &&
        !/^Kind:/.test(l) &&
        !/^Language:/.test(l) &&
        !/^\d{2}:\d{2}/.test(l) &&  // timestamp lines
        !/^NOTE/.test(l) &&
        !/^\s*$/.test(l)
      );

      if (textLines.length === 0) {
        errors.push(`${instance}: caption file was empty or unparseable`);
        continue;
      }

      // Decode HTML entities and join
      const raw = textLines.join(' ').replace(/<[^>]+>/g, '');
      const tmp = document.createElement('textarea');
      tmp.innerHTML = raw;
      const transcript = tmp.value.replace(/\s+/g, ' ').trim();

      if (transcript.length < 20) {
        errors.push(`${instance}: transcript too short (${transcript.length} chars)`);
        continue;
      }

      console.log(`[YT] Transcript fetched via ${instance} (${transcript.length} chars)`);
      return { transcript, errors };
    } catch (e) {
      errors.push(`${instance}: ${e.name === 'TimeoutError' ? 'timed out' : e.message}`);
      continue;
    }
  }

  // ---- Strategy 2: CORS proxy → YouTube page → extract captionTracks ----
  const watchUrl = `https://www.youtube.com/watch?v=${videoId}`;
  const proxies = [
    { name: 'allorigins', fn: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
    { name: 'codetabs',   fn: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
  ];

  for (const proxy of proxies) {
    try {
      const resp = await fetch(proxy.fn(watchUrl), { signal: AbortSignal.timeout(12000) });
      if (!resp.ok) {
        errors.push(`${proxy.name}: YouTube page returned HTTP ${resp.status}`);
        continue;
      }
      const html = await resp.text();

      if (html.includes('consent.youtube') || html.includes('consent.google')) {
        errors.push(`${proxy.name}: YouTube returned a consent/cookie wall page`);
        continue;
      }

      // Try multiple regex patterns for captionTracks
      let match = html.match(/"captionTracks"\s*:\s*(\[[\s\S]*?\])\s*,\s*"/);
      if (!match) match = html.match(/"captionTracks"\s*:\s*(\[.*?\])/);
      if (!match) {
        const hasCaptions = html.includes('captionTracks');
        const hasPlayer = html.includes('ytInitialPlayerResponse');
        errors.push(`${proxy.name}: could not extract captionTracks (` +
          `playerResponse=${hasPlayer}, captionsRef=${hasCaptions}, pageLen=${html.length})`);
        continue;
      }

      let tracks;
      try { tracks = JSON.parse(match[1]); } catch (pe) {
        errors.push(`${proxy.name}: captionTracks JSON parse failed: ${pe.message}`);
        continue;
      }

      const track = tracks.find(t => t.languageCode === 'en')
                 || tracks.find(t => (t.languageCode || '').startsWith('en'))
                 || tracks[0];
      if (!track || !track.baseUrl) {
        errors.push(`${proxy.name}: no usable caption track in ${tracks.length} tracks`);
        continue;
      }

      const capResp = await fetch(proxy.fn(track.baseUrl), { signal: AbortSignal.timeout(10000) });
      if (!capResp.ok) {
        errors.push(`${proxy.name}: caption XML returned HTTP ${capResp.status}`);
        continue;
      }
      const xml = await capResp.text();

      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const textNodes = doc.querySelectorAll('text');
      if (textNodes.length === 0) {
        errors.push(`${proxy.name}: caption XML had no <text> nodes (len=${xml.length})`);
        continue;
      }

      let transcript = '';
      textNodes.forEach(t => { transcript += t.textContent.replace(/\n/g, ' ') + ' '; });
      const tmp = document.createElement('textarea');
      tmp.innerHTML = transcript;
      const result = tmp.value.replace(/\s+/g, ' ').trim();

      console.log(`[YT] Transcript fetched via ${proxy.name} proxy (${result.length} chars)`);
      return { transcript: result, errors };
    } catch (e) {
      errors.push(`${proxy.name}: ${e.name === 'TimeoutError' ? 'timed out' : e.message}`);
      continue;
    }
  }

  return { transcript: null, errors };
}

  const upperCount = (text.match(/[A-Z]/g) || []).length;
  const lowerCount = (text.match(/[a-z]/g) || []).length;
  const isMostlyUpper = upperCount > lowerCount * 1.5;

  if (!isMostlyUpper) {
    let m;

    function addCapPlace(name) {
      name = name.trim().replace(/[.,!?;:()]+$/, '').replace(/^[.,!?;:()]+/, '').trim();
      if (name.length < 2) return;
      if (/['']s$/i.test(name)) name = name.replace(/['']s$/i, '').trim();
      if (/(?:ian|ish|ese|ean)$/i.test(name) && name.split(/\s+/).length === 1) return;
      const key = name.toLowerCase();
      if (seen.has(key)) return;
      if (name === name.toLowerCase()) return;
      if (name.length <= 2 && name.split(/\s+/).length === 1) return;
      seen.add(key);
      const pos = text.indexOf(name);
      places.push({ name, pos: pos >= 0 ? pos : 9999999 });
    }

    // Preposition + Capitalized Words
    const prep = /\b(?:in|at|to|from|near|outside|around|through|across|toward|towards|visit(?:ed|ing)?|travel(?:ed)?\s+to|flew\s+to|dr[io]ve\s+to|arrived?\s+(?:in|at)|went\s+to|go(?:ing)?\s+to|headed?\s+(?:to|for)|heading\s+(?:to|for)|located?\s+in|based\s+in|moved?\s+to|live[sd]?\s+in|born\s+in|stop(?:ped)?\s+(?:in|at)|explore[sd]?)\s+([A-Z][a-zA-Z']+(?:(?:\s+(?:of|the|de|del|la|le|los|las|al|el|and|on|upon)\s+)?[A-Z][a-zA-Z']+)*)/g;
    while ((m = prep.exec(text)) !== null) addCapPlace(m[1]);

    // "City/Town/etc of Name"
    const typeOf = /\b(?:city|town|state|country|island|village|region|province|republic|kingdom|county|district|municipality)\s+of\s+([A-Z][a-zA-Z']+(?:\s+[A-Z][a-zA-Z']+)*)/gi;
    while ((m = typeOf.exec(text)) !== null) addCapPlace(m[1]);

    // "Name + place type"
    const nameType = /\b([A-Z][a-zA-Z']+(?:\s+[A-Z][a-zA-Z']+)*\s+(?:City|Town|State|Country|Island|Mountain|River|Lake|Ocean|Sea|Beach|Park|Forest|Desert|Valley|Canyon|Bridge|Museum|Cathedral|Temple|Palace|Castle|Airport|Station|Harbor|Port|Square|Plaza|Boulevard|Tower|Falls|Springs|Creek|Bay|Gulf|Peninsula|Strait|Cape|Point))\b/g;
    while ((m = nameType.exec(text)) !== null) addCapPlace(m[1]);

    // "Mount/Lake/Cape/Fort/Saint/San + Name"
    const typePrefix = /\b((?:Mount|Mt\.?|Lake|Cape|Fort|Ft\.?|Port|Saint|St\.?|San|Santa|Los|Las)\s+[A-Z][a-zA-Z']+(?:\s+[A-Z][a-zA-Z']+)*)\b/g;
    while ((m = typePrefix.exec(text)) !== null) addCapPlace(m[1]);

    // "Name, State/Country"
    const cityState = /\b([A-Z][a-zA-Z']+(?:\s+[A-Z][a-zA-Z']+)*),\s*([A-Z][a-zA-Z']+(?:\s+[A-Z][a-zA-Z']+)*)\b/g;
    while ((m = cityState.exec(text)) !== null) addCapPlace(m[0]);
  }

  // Sort by order of appearance in the transcript, then return just the names
  places.sort((a, b) => a.pos - b.pos);
  return places.map(p => p.name);
}

async function processYouTubeVideo(input) {
  console.log('[YT] processYouTubeVideo called with:', input);
  const videoId = extractVideoId(input);
  if (!videoId) {
    console.warn('[YT] Could not extract video ID from:', input);
    setStatus('Could not recognize a YouTube video ID from: "' + input.substring(0, 80) + '"');
    return;
  }
  console.log('[YT] Extracted video ID:', videoId);

  ytDropZone.classList.remove('loaded');
  ytDropZone.classList.add('processing');
  ytDropZone.textContent = 'Fetching transcript\u2026';
  setStatus(`Fetching transcript for video ${videoId}\u2026`);

  const result = await fetchTranscript(videoId);
  const transcript = result.transcript;
  const fetchErrors = result.errors || [];

  if (!transcript) {
    ytDropZone.classList.remove('processing');
    ytDropZone.textContent = 'Transcript not available \u2014 try another video';
    // Build a helpful error message from the diagnostics
    let detail = '\u274c Transcript fetch failed:';
    if (fetchErrors.some(e => e.includes('no caption tracks'))) {
      detail += ' This video does not appear to have any captions or subtitles.';
    } else if (fetchErrors.some(e => e.includes('consent'))) {
      detail += ' YouTube returned a consent/cookie page (may be region-related). Try clicking the zone to paste the URL instead.';
    } else if (fetchErrors.some(e => e.includes('timed out'))) {
      detail += ' All transcript services timed out. Please try again in a moment.';
    } else if (fetchErrors.length > 0) {
      detail += ' Tried ' + fetchErrors.length + ' sources but none could retrieve the captions. The video may restrict access.';
    } else {
      detail += ' No transcript services were reachable.';
    }
    detail += ' (See browser console for full diagnostics.)';
    console.warn('[YT] Transcript fetch failed. Diagnostics:', fetchErrors);
    setStatus(detail);
    return;
  }

  ytDropZone.textContent = 'Extracting places\u2026';
  setStatus('Got transcript \u2014 scanning for geographic places\u2026');
  await new Promise(r => setTimeout(r, 50));

  const places = extractPlacesFromTranscript(transcript);
  console.log(`[YT] Transcript length: ${transcript.length} chars. Places found: ${places.length}`, places);

  if (places.length === 0) {
    ytDropZone.classList.remove('processing');
    ytDropZone.textContent = 'No places found \u2014 try another video';
    setStatus('\u2705 Transcript was retrieved successfully, but no geographic places were identified in it. This video may not mention specific locations.');
    return;
  }

  // Populate the location list
  locationList.length = 0;
  places.forEach(p => locationList.push(p));
  currentLocIndex = 0;

  ytDropZone.classList.remove('processing');
  ytDropZone.classList.add('loaded');
  ytDropZone.textContent = `${places.length} places found from video`;

  // Reset the file drop zone since we're replacing the list
  dropZone.classList.remove('loaded');
  dropZone.textContent = 'Drop a file with locations';

  renderLocationList();
  locPanel.style.display = 'block';
  updateListStatus();
  setStatus(`Found ${places.length} places in the video transcript. Select one or click Next. Double-click to go directly.`);
}

// YouTube drop zone event handlers
ytDropZone.addEventListener('dragenter', (e) => {
  e.preventDefault();
  ytDropZone.classList.add('drag-over');
});
ytDropZone.addEventListener('dragover', (e) => {
  e.preventDefault();  // REQUIRED: without this, the browser won't fire 'drop'
  ytDropZone.classList.add('drag-over');
});
ytDropZone.addEventListener('dragleave', () => ytDropZone.classList.remove('drag-over'));

ytDropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  e.stopPropagation();
  ytDropZone.classList.remove('drag-over');

  // Try multiple data formats — different drag sources populate different types
  const uriList = e.dataTransfer.getData('text/uri-list') || '';
  const plain   = e.dataTransfer.getData('text/plain') || '';
  const html    = e.dataTransfer.getData('text/html') || '';

  console.log('[YT] Drop event fired. Data types:', [...e.dataTransfer.types]);
  console.log('[YT] text/uri-list:', uriList);
  console.log('[YT] text/plain:', plain);
  if (html) console.log('[YT] text/html:', html.substring(0, 200));

  // Extract URL: try uri-list first, then plain text, then pull href from HTML
  let url = uriList || plain || '';

  if (!url && html) {
    const hrefMatch = html.match(/href="([^"]*youtube[^"]*)"/) || html.match(/href="([^"]*youtu\.be[^"]*)"/);
    if (hrefMatch) url = hrefMatch[1];
  }

  // Clean up — uri-list can have multiple lines or comment lines starting with #
  url = url.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'))[0] || '';

  if (url) {
    console.log('[YT] Processing URL:', url);
    processYouTubeVideo(url);
  } else {
    console.warn('[YT] Drop event had no usable URL data');
    setStatus('No YouTube URL detected in that drop. Try clicking the zone to paste a URL instead.');
  }
});

ytDropZone.addEventListener('click', () => {
  const url = prompt('Paste a YouTube video URL:');
  if (url && url.trim()) {
    console.log('[YT] Processing pasted URL:', url.trim());
    processYouTubeVideo(url.trim());
  }
});

// ============================================================
//  PASTE TRANSCRIPT → PLACES
// ============================================================
const pasteArea = document.getElementById('paste-transcript');
const processTextBtn = document.getElementById('process-text-btn');

function stripTimestamps(text) {
  return text
    // YouTube-style timestamps: "0:00", "1:23", "01:23:45"
    .replace(/^\s*\d{1,2}:\d{2}(?::\d{2})?\s*/gm, '')
    // SRT/VTT timestamps: "00:01:23,456 --> 00:01:25,789" or with dots
    .replace(/\d{2}:\d{2}[:.]\d{2,3}\s*-->\s*\d{2}:\d{2}[:.]\d{2,3}[^\n]*/g, '')
    // VTT header lines
    .replace(/^WEBVTT[\s\S]*?\n\n/m, '')
    .replace(/^Kind:.*$/gm, '')
    .replace(/^Language:.*$/gm, '')
    // SRT sequence numbers (bare numbers on their own line)
    .replace(/^\s*\d+\s*$/gm, '')
    // HTML/formatting tags
    .replace(/<[^>]+>/g, '')
    // Collapse whitespace
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

processTextBtn.addEventListener('click', () => {
  const raw = pasteArea.value.trim();
  if (!raw) {
    setStatus('Please paste some text into the transcript area first.');
    return;
  }

  console.log('[Paste] Processing pasted text, raw length:', raw.length);
  const cleaned = stripTimestamps(raw);
  console.log('[Paste] After stripping timestamps, length:', cleaned.length);

  const places = extractPlacesFromTranscript(cleaned);
  console.log(`[Paste] Places found: ${places.length}`, places);

  if (places.length === 0) {
    setStatus('\u2705 Text was processed, but no geographic places were identified in it.');
    return;
  }

  // Populate the location list
  locationList.length = 0;
  places.forEach(p => locationList.push(p));
  currentLocIndex = 0;

  // Reset the other drop zones
  dropZone.classList.remove('loaded');
  dropZone.textContent = 'Drop a file with locations';
  ytDropZone.classList.remove('loaded');
  ytDropZone.textContent = 'Drop a YouTube link here, or click to paste';

  renderLocationList();
  locPanel.style.display = 'block';
  updateListStatus();
  setStatus(`Found ${places.length} places from pasted text. Select one or click Next. Double-click to go directly.`);
});

// ============================================================
//  SETTINGS (hamburger menu)
// ============================================================
// When served from localhost (e.g. via serve.js), use the local proxy to avoid CORS.
// When served from elsewhere, call the gateway directly.
const DEFAULT_ENDPOINT = location.hostname === 'localhost'
  ? '/chat'
  : 'https://llm-gateway-730560815836.us-central1.run.app/chat';
const DEFAULT_MODEL = 'gpt-4.1-mini';

const settingsToggle = document.getElementById('settings-toggle');
const settingsPanel = document.getElementById('settings-panel');
const settingsEndpoint = document.getElementById('settings-endpoint');
const settingsModel = document.getElementById('settings-model');
const settingsSaveBtn = document.getElementById('settings-save-btn');

function loadSettings() {
  return {
    endpoint: localStorage.getItem('ai_endpoint') || DEFAULT_ENDPOINT,
    model: localStorage.getItem('ai_model') || DEFAULT_MODEL
  };
}

function saveSettings(endpoint, model) {
  localStorage.setItem('ai_endpoint', endpoint);
  localStorage.setItem('ai_model', model);
}

// Populate fields from saved settings
(function initSettings() {
  const s = loadSettings();
  settingsEndpoint.value = s.endpoint;
  settingsModel.value = s.model;
})();

settingsToggle.addEventListener('click', () => {
  settingsToggle.classList.toggle('open');
  settingsPanel.classList.toggle('open');
});

settingsSaveBtn.addEventListener('click', () => {
  const ep = settingsEndpoint.value.trim();
  const mdl = settingsModel.value.trim();
  if (!ep) { settingsEndpoint.focus(); return; }
  if (!mdl) { settingsModel.focus(); return; }
  saveSettings(ep, mdl);
  settingsToggle.classList.remove('open');
  settingsPanel.classList.remove('open');
  setStatus('Settings saved.');
});

// ============================================================
//  AI PLACE FINDER (via AI Gateway)
// ============================================================
const aiPromptInput = document.getElementById('ai-prompt-input');
const createListBtn = document.getElementById('create-list-btn');

createListBtn.addEventListener('click', async () => {
  const prompt = aiPromptInput.value.trim();
  if (!prompt) {
    setStatus('Please enter a description of the places you want.');
    return;
  }

  createListBtn.disabled = true;
  createListBtn.textContent = 'Creating\u2026';
  setStatus('Asking AI to generate a list of places\u2026');

  try {
    const systemPrompt = `You are a geographic place list generator. The user will describe a set of places they want. Respond with ONLY a plain list of place names, one per line. Each line should be a real, geocodable place name (city, landmark, address, etc.). Do not include numbering, bullet points, explanations, or any other text — just the place names, one per line.`;

    const settings = loadSettings();
    const resp = await fetch(settings.endpoint, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        provider: 'openai',
        model: settings.model,
        message: systemPrompt + '\n\nUser request: ' + prompt,
        stream: false
      })
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.error || `Gateway returned ${resp.status}`);
    }

    const data = await resp.json();
    const responseText = data.response || '';
    console.log('[AI] Gateway response:', responseText);
    console.log('[AI] Request ID:', data.request_id);

    // Parse response into place list — one place per line
    const places = responseText
      .split(/\r?\n/)
      .map(l => l.replace(/^\d+[\.\)\-]\s*/, '').trim())   // strip numbering if model adds any
      .filter(l => l.length > 0 && l.length < 200);          // sanity filter

    if (places.length === 0) {
      setStatus('AI returned a response but no places could be extracted. Try rephrasing your prompt.');
      return;
    }

    // Populate the location list (same pattern as file load / transcript)
    locationList.length = 0;
    places.forEach(p => locationList.push(p));
    currentLocIndex = 0;

    // Reset other source indicators
    dropZone.classList.remove('loaded');
    dropZone.textContent = 'Drop a file with locations';
    ytDropZone.classList.remove('loaded');
    ytDropZone.textContent = 'Drop a YouTube link here, or click to paste';

    renderLocationList();
    locPanel.style.display = 'block';
    updateListStatus();
    setStatus(`AI generated ${places.length} places. Select one or click Next. Double-click to go directly.`);

  } catch (err) {
    console.error('[AI] Error:', err);
    setStatus(`AI request failed: ${err.message}`);
  } finally {
    createListBtn.disabled = false;
    createListBtn.textContent = 'Create List';
  }
});

// ============================================================
//  INITIAL STATE
// ============================================================
setStatus('Type a location and press Go, or drop a file with locations');
</script>
