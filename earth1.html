<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow: hidden; height: 100vh; display: flex; flex-direction: row;
}
/* Main area: globe + map stacked */
#main-area { flex: 1; position: relative; display: flex; flex-direction: column; }
#globe-container { flex: 1; width: 100%; position: relative; }
canvas#globe { width: 100%; height: 100%; display: block; }
#map-container {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #1a1a2e; z-index: 5;
}
#map-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
#map-canvas:active { cursor: grabbing; }
/* Right-side panel — 30% of viewport */
#side-panel {
  width: 34vw; min-width: 380px; max-width: 600px; padding: 30px 24px; display: flex;
  flex-direction: column; gap: 20px; background: rgba(10,10,20,0.95);
  border-left: 1px solid #222; overflow-y: auto; z-index: 10;
}
#side-panel h2 { font-size: 28px; font-weight: 600; color: #e5e7eb; margin: 0; }
.panel-section { display: flex; flex-direction: column; gap: 16px; }
.panel-divider { border: none; border-top: 1px solid #222; margin: 8px 0; }
#controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
input#location-input {
  padding: 18px 20px; border-radius: 10px; border: 1px solid #333;
  background: #111827; color: #fff; font-size: 24px; width: 100%; outline: none;
}
input#location-input:focus { border-color: #2563eb; }
input#location-input::placeholder { color: #555; }
#go-row { display: flex; gap: 10px; }
button {
  padding: 18px 28px; border-radius: 10px; border: none;
  background: #2563eb; color: #fff; font-size: 22px; font-weight: 600;
  cursor: pointer; transition: background 0.2s; white-space: nowrap;
}
button:hover { background: #1d4ed8; }
button:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
#map-btn { display: none; background: #059669; }
#map-btn:hover { background: #047857; }
#back-btn { display: none; background: #6366f1; }
#back-btn:hover { background: #4f46e5; }
#status { font-size: 20px; color: #6b7280; min-height: 24px; margin-top: auto; }
#map-controls {
  position: absolute; top: 20px; right: 20px; display: flex;
  flex-direction: column; gap: 10px; z-index: 20;
}
#map-controls button {
  width: 64px; height: 64px; font-size: 34px; padding: 0;
  border-radius: 12px; background: rgba(30,30,50,0.9); backdrop-filter: blur(8px);
}
#map-controls button:hover { background: rgba(50,50,80,0.95); }
#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 15; display: none;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,100,100,0.6);
}
#crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
#crosshair::after { width: 2px; height: 20px; top: -10px; left: -1px; }

/* Drop zone */
#drop-zone {
  border: 3px dashed #444; border-radius: 12px; padding: 28px 24px;
  text-align: center; color: #6b7280; font-size: 22px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
}
#drop-zone.drag-over { border-color: #2563eb; background: rgba(37,99,235,0.1); color: #93c5fd; }
#drop-zone.loaded { border-color: #059669; color: #6ee7b7; }

/* Location list panel */
#location-panel {
  display: none; width: 100%; max-width: 500px;
  margin-top: 4px;
}
#location-list {
  max-height: 260px; overflow-y: auto; background: #111827;
  border: 1px solid #333; border-radius: 10px; margin-bottom: 10px;
  scrollbar-width: thin; scrollbar-color: #444 #111827;
}
#location-list::-webkit-scrollbar { width: 8px; }
#location-list::-webkit-scrollbar-track { background: #111827; }
#location-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
.loc-item {
  padding: 14px 18px; font-size: 22px; color: #d1d5db; cursor: pointer;
  border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
}
.loc-item:last-child { border-bottom: none; }
.loc-item:hover { background: #1e293b; }
.loc-item.active { background: #1e3a5f; color: #93c5fd; }
.loc-item .loc-num { color: #6b7280; font-size: 18px; min-width: 28px; }
#list-controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
#list-controls button { font-size: 22px; padding: 16px 24px; }
#go-there-btn { background: #059669; }
#go-there-btn:hover { background: #047857; }
#next-loc-btn { background: #7c3aed; }
#next-loc-btn:hover { background: #6d28d9; }
#list-status { font-size: 20px; color: #6b7280; }

/* Zoom slider */
#zoom-slider-row {
  display: flex; align-items: center; gap: 14px; font-size: 20px; color: #9ca3af;
  flex-wrap: wrap;
}
#zoom-slider {
  -webkit-appearance: none; appearance: none; width: 100%; height: 10px;
  background: #333; border-radius: 5px; outline: none;
}
#zoom-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 26px; height: 26px; border-radius: 50%;
  background: #2563eb; cursor: pointer;
}
#zoom-slider::-moz-range-thumb {
  width: 26px; height: 26px; border-radius: 50%;
  background: #2563eb; cursor: pointer; border: none;
}
</style>
</head>
<body>

<div id="main-area">
  <div id="globe-container">
    <canvas id="globe"></canvas>
  </div>
  <div id="map-container">
    <canvas id="map-canvas"></canvas>
    <div id="crosshair"></div>
    <div id="map-controls">
      <button id="zoom-in-btn" title="Zoom in">+</button>
      <button id="zoom-out-btn" title="Zoom out">&minus;</button>
      <button id="back-btn" title="Back to globe">&#x1f310;</button>
    </div>
  </div>
</div>

<div id="side-panel">
  <div class="panel-section">
    <h2>Go to Location</h2>
    <input id="location-input" type="text" placeholder="Enter lat,lng or address..." />
    <div id="go-row">
      <button id="go-btn">Go</button>
      <button id="map-btn">Map</button>
    </div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>Zoom Level</h2>
    <div id="zoom-slider-row">
      <label for="zoom-slider">Initial zoom:</label>
      <input id="zoom-slider" type="range" min="1.2" max="2.8" step="0.1" value="1.8" />
      <span id="zoom-label">Medium</span>
    </div>
  </div>

  <hr class="panel-divider" />

  <div class="panel-section">
    <h2>Location List</h2>
    <div id="drop-zone">Drop a file with locations</div>
    <div id="location-panel">
      <div id="location-list"></div>
      <div id="list-controls">
        <button id="go-there-btn">Go There</button>
        <button id="next-loc-btn">Next Location</button>
        <span id="list-status"></span>
      </div>
    </div>
  </div>

  <div id="status"></div>
</div>

<script>
// ============================================================
//  STATE
// ============================================================
const state = {
  mode: 'globe',           // 'globe' | 'zooming' | 'paused' | 'map'
  targetLat: null,
  targetLng: null,
  currentLat: 0,
  currentLng: 0,
  autoRotate: true,
  zoomLevel: 1,
  mapZoom: 12,
  mapCenterLat: 0,
  mapCenterLng: 0,
  dragStart: null,
  dragOffset: { x: 0, y: 0 },
};

// ============================================================
//  THREE.JS GLOBE SETUP
// ============================================================
const container = document.getElementById('globe-container');
const canvas = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 4.0);

// Lights
scene.add(new THREE.AmbientLight(0x444466, 1.2));
const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);

// Earth sphere
const earthGeom = new THREE.SphereGeometry(1, 64, 64);
let earthMat, earthMesh, cloudMesh;

// Create a procedural earth texture as fallback, but try loading real one
function createProceduralTexture() {
  const c = document.createElement('canvas');
  c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');

  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#1a3a5c');
  grad.addColorStop(0.3, '#1e4d7a');
  grad.addColorStop(0.5, '#1565a0');
  grad.addColorStop(0.7, '#1e4d7a');
  grad.addColorStop(1, '#1a3a5c');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1024, 512);

  // Simplified continent shapes (rough outlines)
  ctx.fillStyle = '#2d7a3a';
  const continents = [
    // North America
    [[200,80],[260,80],[290,110],[300,140],[280,170],[260,200],[230,210],[200,190],[180,150],[170,120],[185,90]],
    // South America
    [[250,220],[275,230],[290,260],[295,300],[280,350],[260,370],[240,360],[230,320],[235,280],[240,240]],
    // Europe
    [[470,80],[520,75],[540,90],[530,110],[510,130],[490,140],[470,130],[460,110],[465,90]],
    // Africa
    [[470,150],[510,140],[540,160],[555,200],[550,250],[540,300],[520,330],[490,340],[470,310],[460,270],[455,220],[460,180]],
    // Asia
    [[530,60],[620,50],[700,55],[740,70],[750,100],[730,130],[700,150],[660,160],[620,170],[580,160],[550,140],[530,110],[520,80]],
    // India
    [[610,170],[630,175],[635,210],[620,240],[605,230],[600,195]],
    // Australia
    [[700,280],[750,275],[770,290],[775,310],[760,330],[730,335],[710,320],[700,300]],
    // Greenland
    [[310,40],[350,35],[360,55],[345,70],[320,72],[305,60]],
    // Antarctica
    [[100,460],[300,470],[500,465],[700,470],[900,460],[950,490],[950,512],[50,512],[50,490]],
    // Southeast Asia islands
    [[720,180],[735,178],[740,195],[728,200],[718,192]],
    [[750,200],[768,195],[772,212],[755,218],[748,210]],
  ];

  continents.forEach(pts => {
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fillStyle = '#2d7a3a';
    ctx.fill();
    // Add some terrain variation
    ctx.fillStyle = 'rgba(60,130,60,0.3)';
    ctx.fill();
  });

  // Ice caps
  ctx.fillStyle = 'rgba(220,235,245,0.7)';
  ctx.fillRect(0, 0, 1024, 25);
  ctx.fillRect(0, 487, 1024, 25);

  // Latitude/longitude grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let lat = 0; lat < 512; lat += 512/18) {
    ctx.beginPath(); ctx.moveTo(0, lat); ctx.lineTo(1024, lat); ctx.stroke();
  }
  for (let lng = 0; lng < 1024; lng += 1024/36) {
    ctx.beginPath(); ctx.moveTo(lng, 0); ctx.lineTo(lng, 512); ctx.stroke();
  }

  return new THREE.CanvasTexture(c);
}

function initEarth(texture) {
  earthMat = new THREE.MeshPhongMaterial({
    map: texture,
    specular: new THREE.Color(0x222244),
    shininess: 15,
  });
  earthMesh = new THREE.Mesh(earthGeom, earthMat);
  scene.add(earthMesh);

  // Atmosphere glow
  const atmosGeom = new THREE.SphereGeometry(1.02, 64, 64);
  const atmosMat = new THREE.MeshPhongMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0.08,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(atmosGeom, atmosMat));

  // Stars
  const starsGeom = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 2000; i++) {
    const r = 50 + Math.random() * 50;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions.push(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta), r*Math.cos(phi));
  }
  starsGeom.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  scene.add(new THREE.Points(starsGeom, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })));
}

// Try loading a real Earth texture, fall back to procedural
const textureLoader = new THREE.TextureLoader();
const textureUrl = 'https://unpkg.com/three-globe@2.31.1/example/img/earth-blue-marble.jpg';
const proceduralTex = createProceduralTexture();

// Start with procedural immediately
initEarth(proceduralTex);

// Try to load the real texture
textureLoader.load(
  textureUrl,
  (tex) => { earthMesh.material.map = tex; earthMesh.material.needsUpdate = true; },
  undefined,
  () => { /* keep procedural */ }
);

// ============================================================
//  GLOBE ROTATION / ANIMATION
// ============================================================
function latLngToRotation(lat, lng) {
  // Three.js sphere: texture maps with phi along Y axis
  // We rotate the sphere so the target lat/lng faces camera
  const phi = THREE.MathUtils.degToRad(lat);
  const theta = -THREE.MathUtils.degToRad(lng) - Math.PI / 2;
  return { x: phi, y: theta };
}

let rotationSpeed = 0.002;
let animating = false;
let animStartTime = 0;
let animStartRot = { x: 0, y: 0 };
let animTargetRot = { x: 0, y: 0 };
let animDuration = 2000;
let zoomAnimating = false;
let zoomStart = 4.0;
let zoomTarget = 4.0;
let zoomStartTime = 0;
let zoomDuration = 1500;

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
}

function shortestAngleDist(from, to) {
  let d = ((to - from) % (Math.PI * 2) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
  return d;
}

// ============================================================
//  GOLD STAR MARKER
// ============================================================
let starMarker = null;

function createStarTexture() {
  const size = 128;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // Draw a 5-pointed star
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.42, innerR = size * 0.18;
  const points = 5;

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, innerR, cx, cy, outerR * 1.3);
  glow.addColorStop(0, 'rgba(255, 215, 0, 0.5)');
  glow.addColorStop(1, 'rgba(255, 215, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, size, size);

  // Star shape
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const angle = (i * Math.PI / points) - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();

  // Gold gradient fill
  const grad = ctx.createLinearGradient(cx - outerR, cy - outerR, cx + outerR, cy + outerR);
  grad.addColorStop(0, '#ffd700');
  grad.addColorStop(0.5, '#fff4a3');
  grad.addColorStop(1, '#ffa500');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#b8860b';
  ctx.lineWidth = 2;
  ctx.stroke();

  return new THREE.CanvasTexture(c);
}

function placeStarAt(lat, lng) {
  if (!earthMesh) return;

  // Remove old star
  if (starMarker && starMarker.parent) {
    starMarker.parent.remove(starMarker);
  }

  // Convert lat/lng to local sphere position.
  // From latLngToRotation: rotating y by -deg(lng)-PI/2 brings the point to +Z.
  // So in local space: lng=0 is at +X, lng=90 is at -Z, lat=90 is at +Y.
  const R = 1.03;
  const latRad = THREE.MathUtils.degToRad(lat);
  const lngRad = THREE.MathUtils.degToRad(lng);
  const x = R * Math.cos(latRad) * Math.cos(lngRad);
  const y = R * Math.sin(latRad);
  const z = -R * Math.cos(latRad) * Math.sin(lngRad);

  if (!starMarker) {
    const starTex = createStarTexture();
    const starMat = new THREE.SpriteMaterial({
      map: starTex,
      transparent: true,
      depthTest: false,
    });
    starMarker = new THREE.Sprite(starMat);
    starMarker.scale.set(0.12, 0.12, 1);
  }

  starMarker.position.set(x, y, z);
  earthMesh.add(starMarker);
}

function removeStarMarker() {
  if (starMarker && starMarker.parent) {
    starMarker.parent.remove(starMarker);
  }
}

function animateToLocation(lat, lng) {
  if (!earthMesh) return;
  state.autoRotate = false;
  state.targetLat = lat;
  state.targetLng = lng;

  // Place gold star at this location
  placeStarAt(lat, lng);

  const target = latLngToRotation(lat, lng);
  animStartRot = { x: earthMesh.rotation.x, y: earthMesh.rotation.y };
  animTargetRot = {
    x: animStartRot.x + shortestAngleDist(animStartRot.x, target.x),
    y: animStartRot.y + shortestAngleDist(animStartRot.y, target.y)
  };
  animDuration = 2000;
  animStartTime = performance.now();
  animating = true;

  // After rotation completes, zoom in using slider value
  setTimeout(() => {
    zoomStart = camera.position.z;
    zoomTarget = getInitialZoom();
    zoomStartTime = performance.now();
    zoomDuration = 2000;
    zoomAnimating = true;

    setTimeout(() => {
      state.mode = 'paused';
      document.getElementById('map-btn').style.display = 'inline-block';
      setStatus('Location centered. Click "Map" to see the map view.');
    }, 2200);
  }, 2200);

  setStatus('Rotating to location...');
  state.mode = 'zooming';
}

// ============================================================
//  RENDER LOOP
// ============================================================
function resize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', () => { resize(); resizeMap(); });
resize();

function renderGlobe(time) {
  if (!earthMesh) return;

  if (state.autoRotate) {
    earthMesh.rotation.y += rotationSpeed;
  }

  if (animating) {
    const elapsed = time - animStartTime;
    const t = Math.min(elapsed / animDuration, 1);
    const e = easeInOutCubic(t);
    earthMesh.rotation.x = animStartRot.x + (animTargetRot.x - animStartRot.x) * e;
    earthMesh.rotation.y = animStartRot.y + (animTargetRot.y - animStartRot.y) * e;
    if (t >= 1) animating = false;
  }

  if (zoomAnimating) {
    const elapsed = time - zoomStartTime;
    const t = Math.min(elapsed / zoomDuration, 1);
    const e = easeInOutCubic(t);
    camera.position.z = zoomStart + (zoomTarget - zoomStart) * e;
    if (t >= 1) zoomAnimating = false;
  }

  renderer.render(scene, camera);
}

function animate(time) {
  requestAnimationFrame(animate);
  if (state.mode !== 'map') {
    renderGlobe(time);
  }
}
requestAnimationFrame(animate);

// ============================================================
//  GEOCODING
// ============================================================
function parseLatLng(input) {
  // Try parsing as lat,lng
  const match = input.match(/^\s*(-?\d+\.?\d*)\s*[,\s]\s*(-?\d+\.?\d*)\s*$/);
  if (match) {
    const lat = parseFloat(match[1]);
    const lng = parseFloat(match[2]);
    if (lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
      return { lat, lng };
    }
  }
  return null;
}

async function geocode(query) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;
  const resp = await fetch(url, {
    headers: { 'User-Agent': 'EarthExplorer/1.0' }
  });
  const data = await resp.json();
  if (data.length > 0) {
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon), name: data[0].display_name };
  }
  return null;
}

// ============================================================
//  MAP VIEW (OpenStreetMap tiles on Canvas)
// ============================================================
const mapCanvas = document.getElementById('map-canvas');
const mapCtx = mapCanvas.getContext('2d');
const tileCache = {};
const TILE_SIZE = 256;

function resizeMap() {
  const mc = document.getElementById('map-container');
  mapCanvas.width = mc.clientWidth * window.devicePixelRatio;
  mapCanvas.height = mc.clientHeight * window.devicePixelRatio;
  mapCanvas.style.width = mc.clientWidth + 'px';
  mapCanvas.style.height = mc.clientHeight + 'px';
  mapCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
}

function lngToTileX(lng, zoom) {
  return ((lng + 180) / 360) * Math.pow(2, zoom);
}

function latToTileY(lat, zoom) {
  const r = Math.PI / 180 * lat;
  return (1 - Math.log(Math.tan(r) + 1/Math.cos(r)) / Math.PI) / 2 * Math.pow(2, zoom);
}

function getTile(x, y, z) {
  const key = `${z}/${x}/${y}`;
  if (tileCache[key]) return tileCache[key];

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = `https://tile.openstreetmap.org/${z}/${x}/${y}.png`;
  const entry = { img, loaded: false };
  img.onload = () => { entry.loaded = true; renderMap(); };
  img.onerror = () => { entry.failed = true; };
  tileCache[key] = entry;
  return entry;
}

function renderMap() {
  if (state.mode !== 'map') return;

  const w = mapCanvas.width / window.devicePixelRatio;
  const h = mapCanvas.height / window.devicePixelRatio;
  const zoom = state.mapZoom;

  mapCtx.fillStyle = '#1a1a2e';
  mapCtx.fillRect(0, 0, w, h);

  const centerTileX = lngToTileX(state.mapCenterLng, zoom);
  const centerTileY = latToTileY(state.mapCenterLat, zoom);

  const offsetX = (centerTileX % 1) * TILE_SIZE;
  const offsetY = (centerTileY % 1) * TILE_SIZE;

  const baseTileX = Math.floor(centerTileX);
  const baseTileY = Math.floor(centerTileY);

  const tilesX = Math.ceil(w / TILE_SIZE) + 2;
  const tilesY = Math.ceil(h / TILE_SIZE) + 2;

  const startX = -Math.floor(tilesX / 2) - 1;
  const startY = -Math.floor(tilesY / 2) - 1;
  const maxTile = Math.pow(2, zoom);

  for (let dx = startX; dx <= startX + tilesX + 1; dx++) {
    for (let dy = startY; dy <= startY + tilesY + 1; dy++) {
      const tx = ((baseTileX + dx) % maxTile + maxTile) % maxTile;
      const ty = baseTileY + dy;
      if (ty < 0 || ty >= maxTile) continue;

      const screenX = w/2 + dx * TILE_SIZE - offsetX;
      const screenY = h/2 + dy * TILE_SIZE - offsetY;

      const tile = getTile(tx, ty, zoom);
      if (tile.loaded) {
        mapCtx.drawImage(tile.img, screenX, screenY, TILE_SIZE, TILE_SIZE);
      } else {
        mapCtx.fillStyle = '#1e293b';
        mapCtx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
        mapCtx.strokeStyle = '#2d3a4e';
        mapCtx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Center marker
  mapCtx.save();
  mapCtx.beginPath();
  mapCtx.arc(w/2, h/2, 6, 0, Math.PI * 2);
  mapCtx.fillStyle = 'rgba(239, 68, 68, 0.9)';
  mapCtx.fill();
  mapCtx.strokeStyle = '#fff';
  mapCtx.lineWidth = 2;
  mapCtx.stroke();
  mapCtx.restore();

  // Attribution
  mapCtx.save();
  mapCtx.fillStyle = 'rgba(0,0,0,0.5)';
  mapCtx.fillRect(0, h - 18, w, 18);
  mapCtx.fillStyle = '#aaa';
  mapCtx.font = '10px sans-serif';
  mapCtx.fillText('\u00A9 OpenStreetMap contributors', 4, h - 5);
  mapCtx.restore();
}

// Map panning
let mapDragging = false;
let mapDragStartX = 0, mapDragStartY = 0;
let mapDragStartLat = 0, mapDragStartLng = 0;

function tileXToLng(x, zoom) {
  return x / Math.pow(2, zoom) * 360 - 180;
}

function tileYToLat(y, zoom) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, zoom);
  return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

mapCanvas.addEventListener('mousedown', (e) => {
  mapDragging = true;
  mapDragStartX = e.clientX;
  mapDragStartY = e.clientY;
  mapDragStartLat = state.mapCenterLat;
  mapDragStartLng = state.mapCenterLng;
});

window.addEventListener('mousemove', (e) => {
  if (!mapDragging) return;
  const dx = e.clientX - mapDragStartX;
  const dy = e.clientY - mapDragStartY;
  const zoom = state.mapZoom;
  const scale = TILE_SIZE * Math.pow(2, zoom);

  const startTileX = lngToTileX(mapDragStartLng, zoom);
  const startTileY = latToTileY(mapDragStartLat, zoom);

  const newTileX = startTileX - dx / TILE_SIZE;
  const newTileY = startTileY - dy / TILE_SIZE;

  state.mapCenterLng = tileXToLng(newTileX, zoom);
  state.mapCenterLat = tileYToLat(newTileY, zoom);

  renderMap();
});

window.addEventListener('mouseup', () => { mapDragging = false; });

mapCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (e.deltaY < 0 && state.mapZoom < 18) { state.mapZoom++; renderMap(); }
  else if (e.deltaY > 0 && state.mapZoom > 2) { state.mapZoom--; renderMap(); }
}, { passive: false });

// Touch support for map
let touchStartDist = 0;
let touchStartZoom = 0;

mapCanvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    mapDragging = true;
    mapDragStartX = e.touches[0].clientX;
    mapDragStartY = e.touches[0].clientY;
    mapDragStartLat = state.mapCenterLat;
    mapDragStartLng = state.mapCenterLng;
  } else if (e.touches.length === 2) {
    mapDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx + dy*dy);
    touchStartZoom = state.mapZoom;
  }
  e.preventDefault();
}, { passive: false });

mapCanvas.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && mapDragging) {
    const dx = e.touches[0].clientX - mapDragStartX;
    const dy = e.touches[0].clientY - mapDragStartY;
    const zoom = state.mapZoom;
    const startTileX = lngToTileX(mapDragStartLng, zoom);
    const startTileY = latToTileY(mapDragStartLat, zoom);
    state.mapCenterLng = tileXToLng(startTileX - dx / TILE_SIZE, zoom);
    state.mapCenterLat = tileYToLat(startTileY - dy / TILE_SIZE, zoom);
    renderMap();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const zoomDelta = Math.round(Math.log2(dist / touchStartDist));
    const newZoom = Math.min(18, Math.max(2, touchStartZoom + zoomDelta));
    if (newZoom !== state.mapZoom) { state.mapZoom = newZoom; renderMap(); }
  }
  e.preventDefault();
}, { passive: false });

mapCanvas.addEventListener('touchend', () => { mapDragging = false; });

// ============================================================
//  TRANSITION TO MAP
// ============================================================
function showMap() {
  state.mode = 'map';
  state.mapCenterLat = state.targetLat;
  state.mapCenterLng = state.targetLng;
  state.mapZoom = 12;

  document.getElementById('globe-container').style.display = 'none';
  document.getElementById('map-container').style.display = 'block';
  document.getElementById('map-btn').style.display = 'none';
  document.getElementById('back-btn').style.display = 'inline-block';
  document.getElementById('crosshair').style.display = 'block';

  resizeMap();
  renderMap();
  setStatus(`Map view \u2014 zoom ${state.mapZoom}`);
}

function showGlobe() {
  state.mode = 'globe';
  state.autoRotate = true;

  // Reset zoom
  camera.position.z = 4.0;
  zoomAnimating = false;
  animating = false;

  document.getElementById('globe-container').style.display = 'block';
  document.getElementById('map-container').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('map-btn').style.display = 'none';
  document.getElementById('crosshair').style.display = 'none';

  resize();
  setStatus('');
}

// ============================================================
//  UI HANDLERS
// ============================================================
const input = document.getElementById('location-input');
const goBtn = document.getElementById('go-btn');
const mapBtn = document.getElementById('map-btn');
const backBtn = document.getElementById('back-btn');
const zoomInBtn = document.getElementById('zoom-in-btn');
const zoomOutBtn = document.getElementById('zoom-out-btn');

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

goBtn.addEventListener('click', handleGo);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleGo(); });

async function handleGo() {
  const val = input.value.trim();
  if (!val) return;

  // If in map mode, go back to globe first
  if (state.mode === 'map') {
    showGlobe();
    await new Promise(r => setTimeout(r, 300));
  }

  goBtn.disabled = true;
  mapBtn.style.display = 'none';
  setStatus('Looking up location...');

  let result = parseLatLng(val);
  if (result) {
    setStatus(`Going to ${result.lat.toFixed(4)}, ${result.lng.toFixed(4)}`);
  } else {
    result = await geocode(val);
    if (!result) {
      setStatus('Location not found. Try coordinates like "48.8566, 2.3522" or a city name.');
      goBtn.disabled = false;
      return;
    }
    setStatus(`Found: ${result.name ? result.name.split(',').slice(0,3).join(',') : val}`);
  }

  goBtn.disabled = false;
  animateToLocation(result.lat, result.lng);
}

mapBtn.addEventListener('click', showMap);
backBtn.addEventListener('click', showGlobe);

zoomInBtn.addEventListener('click', () => {
  if (state.mapZoom < 18) {
    state.mapZoom++;
    renderMap();
    setStatus(`Map view \u2014 zoom ${state.mapZoom}`);
  }
});

zoomOutBtn.addEventListener('click', () => {
  if (state.mapZoom > 2) {
    state.mapZoom--;
    renderMap();
    setStatus(`Map view \u2014 zoom ${state.mapZoom}`);
  }
});

// ============================================================
//  ZOOM SLIDER
// ============================================================
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

function getInitialZoom() {
  // Slider goes from 1.2 (close) to 2.8 (far). Camera default is 4.0.
  // Lower value = more zoomed in
  return parseFloat(zoomSlider.value);
}

function updateZoomLabel() {
  const v = parseFloat(zoomSlider.value);
  if (v <= 1.5) zoomLabel.textContent = 'Very close';
  else if (v <= 1.8) zoomLabel.textContent = 'Close';
  else if (v <= 2.1) zoomLabel.textContent = 'Medium';
  else if (v <= 2.5) zoomLabel.textContent = 'Far';
  else zoomLabel.textContent = 'Very far';
}
zoomSlider.addEventListener('input', updateZoomLabel);
updateZoomLabel();

// ============================================================
//  LOCATION LIST (drag-and-drop)
// ============================================================
const locationList = [];
let currentLocIndex = -1;

const dropZone = document.getElementById('drop-zone');
const locPanel = document.getElementById('location-panel');
const locListEl = document.getElementById('location-list');
const goThereBtn = document.getElementById('go-there-btn');
const nextLocBtn = document.getElementById('next-loc-btn');
const listStatus = document.getElementById('list-status');

// Prevent default drag behavior on the whole page
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  document.body.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); });
});

dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-over'));
dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', handleFileDrop);

// Also allow clicking the drop zone to pick a file
dropZone.addEventListener('click', () => {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.txt,.csv,.text';
  inp.onchange = (e) => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  };
  inp.click();
});

function handleFileDrop(e) {
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length === 0) {
      setStatus('File was empty or had no valid lines.');
      return;
    }
    locationList.length = 0;
    lines.forEach(l => locationList.push(l));
    currentLocIndex = 0;
    dropZone.classList.add('loaded');
    dropZone.textContent = `${locationList.length} locations loaded`;
    renderLocationList();
    locPanel.style.display = 'block';
    updateListStatus();
    setStatus(`Loaded ${locationList.length} locations from "${file.name}". Select one or click Next.`);
  };
  reader.readAsText(file);
}

function renderLocationList() {
  locListEl.innerHTML = '';
  locationList.forEach((loc, i) => {
    const div = document.createElement('div');
    div.className = 'loc-item' + (i === currentLocIndex ? ' active' : '');
    div.innerHTML = `<span class="loc-num">${i + 1}</span><span>${escapeHtml(loc)}</span>`;
    div.addEventListener('click', () => {
      currentLocIndex = i;
      highlightActive();
      updateListStatus();
    });
    locListEl.appendChild(div);
  });
  scrollToActive();
}

function highlightActive() {
  const items = locListEl.querySelectorAll('.loc-item');
  items.forEach((el, i) => {
    el.classList.toggle('active', i === currentLocIndex);
  });
  scrollToActive();
}

function scrollToActive() {
  const active = locListEl.querySelector('.loc-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function updateListStatus() {
  if (locationList.length === 0) {
    listStatus.textContent = '';
  } else {
    listStatus.textContent = `${currentLocIndex + 1} of ${locationList.length}`;
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function goToListLocation(index) {
  if (index < 0 || index >= locationList.length) return;
  currentLocIndex = index;
  highlightActive();
  updateListStatus();

  const val = locationList[index];

  // If in map mode, go back to globe first
  if (state.mode === 'map') {
    showGlobe();
    await new Promise(r => setTimeout(r, 300));
  }

  goThereBtn.disabled = true;
  nextLocBtn.disabled = true;
  goBtn.disabled = true;
  setStatus(`Looking up: ${val}`);

  let result = parseLatLng(val);
  if (result) {
    setStatus(`Going to ${result.lat.toFixed(4)}, ${result.lng.toFixed(4)}`);
  } else {
    result = await geocode(val);
    if (!result) {
      setStatus(`Could not find "${val}". Try the next location.`);
      goThereBtn.disabled = false;
      nextLocBtn.disabled = false;
      goBtn.disabled = false;
      return;
    }
    setStatus(`Found: ${result.name ? result.name.split(',').slice(0,3).join(',') : val}`);
  }

  goThereBtn.disabled = false;
  nextLocBtn.disabled = false;
  goBtn.disabled = false;
  animateToLocation(result.lat, result.lng);
}

goThereBtn.addEventListener('click', () => {
  if (locationList.length > 0 && currentLocIndex >= 0) {
    goToListLocation(currentLocIndex);
  }
});

nextLocBtn.addEventListener('click', () => {
  if (locationList.length === 0) return;
  let next = currentLocIndex + 1;
  if (next >= locationList.length) next = 0; // wrap around
  goToListLocation(next);
});

// ============================================================
//  INITIAL STATE
// ============================================================
setStatus('Type a location and press Go, or drop a file with locations');
</script>
